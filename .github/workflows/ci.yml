---
name: CI

on:  # yamllint disable-line
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py 2>/dev/null || true

      - name: Lint with flake8
        run: |
          flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source \
            --statistics
          flake8 scripts/ --count --max-complexity=10 --max-line-length=120 \
            --statistics

      - name: Check wordlist consistency
        run: |
          for f in wordlists/*.txt; do
            duplicates=$(sort "$f" | uniq -d)
            if [ -n "$duplicates" ]; then
              echo "WARNING: Duplicates found in $f:"
              echo "$duplicates"
            fi
            lines=$(wc -l < "$f")
            echo "$f: $lines entries"
          done

      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint docker-compose.yml
          yamllint .github/workflows/ci.yml
